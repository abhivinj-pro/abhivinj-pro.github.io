<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seed CISA D4 Tasks → Firebase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f111a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid #2d3452;
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 560px;
      width: 100%;
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: #94a3b8; font-size: 0.875rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
    input {
      width: 100%;
      background: #0f111a;
      border: 1px solid #2d3452;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log {
      margin-top: 24px;
      font-size: 0.82rem;
      line-height: 1.7;
      max-height: 400px;
      overflow-y: auto;
      background: #0a0c14;
      border-radius: 8px;
      padding: 14px;
      display: none;
    }
    .ok   { color: #4ade80; }
    .err  { color: #f87171; }
    .info { color: #60a5fa; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>
<div class="card">
  <h1>Seed CISA D4 Tasks → Firebase</h1>
  <p class="sub">Signs in, reads your existing tasks, then merges in 24 CISA Domain 4 Work tasks (today onwards) without touching any existing tasks.</p>

  <div id="login-section">
    <label for="email">Email</label>
    <input id="email" type="email" value="abhivinj@gmail.com" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Your Firebase password" />
    <button id="btn-seed" onclick="runSeed()">Sign in &amp; Seed CISA D4 Tasks</button>
  </div>

  <div id="log"></div>
</div>

<script src="assets/js/polyfills.js"></script>
<script src="assets/js/config/firebase-config.js"></script>
<script src="assets/js/auth/auth-client.js"></script>
<script src="assets/js/data/firestore-client.js"></script>

<script>
(function () {
  var ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M10 9l5 3-5 3V9z"/><path d="M8 21h8M12 17v4"/></svg>';

  var CISA_TASKS = [
    { id: 'cisa-d4-013', title: 'CISA D4: Day 7.1 IT Asset Management',                        date: '2026-05-26' },
    { id: 'cisa-d4-014', title: 'CISA D4: Day 7.2 Job Scheduling',                                date: '2026-05-26' },
    { id: 'cisa-d4-015', title: 'CISA D4: Day 7.3 System Interfaces',                        date: '2026-05-27' },
    { id: 'cisa-d4-016', title: 'CISA D4: Day 7.4 EUC',                                       date: '2026-05-27' },
    { id: 'cisa-d4-017', title: 'CISA D4: Day 7.5 Data Governance',                           date: '2026-05-27' },
    { id: 'cisa-d4-018', title: 'CISA D4: Day 8.1 IS Architecture & OS',                      date: '2026-05-27' },
    { id: 'cisa-d4-019', title: 'CISA D4: Day 8.2 Software Licensing',                        date: '2026-05-27' },
    { id: 'cisa-d4-020', title: 'CISA D4: Day 9.1 Q&A, EMI, Attenuation',                    date: '2026-05-27' },
    { id: 'cisa-d4-021', title: 'CISA D4: Day 9.2 Cross Talk, Q&A',                           date: '2026-05-27' },
    { id: 'cisa-d4-022', title: 'CISA D4: Day 10 Q&A',                                        date: '2026-05-27' },
    { id: 'cisa-d4-023', title: 'CISA D4: Day 11.1 Q&A',                                      date: '2026-05-27' },
    { id: 'cisa-d4-024', title: 'CISA D4: Day 11.2 Q&A',                                      date: '2026-05-27' },
    { id: 'cisa-d4-025', title: 'CISA D4: Day 11.3 Q&A',                                      date: '2026-05-27' },
    { id: 'cisa-d4-026', title: 'CISA D4: Day 11.4 Q&A',                                      date: '2026-05-28' },
    { id: 'cisa-d4-027', title: 'CISA D4: Day 11.5 Q&A',                                      date: '2026-05-28' },
    { id: 'cisa-d4-028', title: 'CISA D4: Day 12.1 Q&A',                                      date: '2026-05-28' },
    { id: 'cisa-d4-029', title: 'CISA D4: Day 12.2 Q&A',                                      date: '2026-05-28' },
    { id: 'cisa-d4-030', title: 'CISA D4: Day 13.1 Database Management',                      date: '2026-05-28' },
    { id: 'cisa-d4-031', title: 'CISA D4: Day 13.2 Database Management Part 2',               date: '2026-05-28' },
    { id: 'cisa-d4-032', title: 'CISA D4: Day 14.1 DBMS Q&A',                                 date: '2026-05-28' },
    { id: 'cisa-d4-033', title: 'CISA D4: Day 14.2 Destroying Drives, Data Warehouse Q&A',   date: '2026-05-28' },
    { id: 'cisa-d4-034', title: 'CISA D4: Extras \u2013 Capacity Management',                 date: '2026-05-28' },
    { id: 'cisa-d4-035', title: 'CISA D4: Extras \u2013 Incident Management',                 date: '2026-05-28' },
    { id: 'cisa-d4-036', title: 'CISA D4: Extras \u2013 Problem Management',                  date: '2026-05-28' },
    { id: 'cisa-d4-037', title: 'CISA D4: Question on SLA',                                   date: '2026-05-28' },
    { id: 'cisa-d4-extra', title: 'CISA D4: DOM 4 New Changes 2024',                          date: '2026-05-29' }
  ];

  var logEl  = document.getElementById('log');
  var btnSeed = document.getElementById('btn-seed');

  function log(msg, cls) {
    logEl.style.display = 'block';
    var line = document.createElement('div');
    if (cls) { line.className = cls; }
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  window.runSeed = function () {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if (!email || !password) {
      log('⚠  Please fill in both email and password.', 'warn');
      return;
    }

    btnSeed.disabled = true;
    log('Signing in as ' + email + ' …', 'info');

    Auth.signIn(email, password)
      .then(function (user) {
        log('✓ Signed in. UID: ' + user.uid, 'ok');

        var docPath = 'users/' + user.uid + '/config/tasks';
        log('Reading existing tasks from Firestore …', 'info');

        return Firestore.getDoc(docPath).then(function (doc) {
          var existing = (doc && Array.isArray(doc.tasks)) ? doc.tasks : [];
          log('Found ' + existing.length + ' existing task(s).', 'info');

          // Remove any stale cisa-d4-* entries so we get a clean merge
          var cisaIds = CISA_TASKS.reduce(function (acc, t) {
            acc[t.id] = true;
            return acc;
          }, {});
          var kept = existing.filter(function (t) { return !cisaIds[t.id]; });
          log('Kept ' + kept.length + ' non-CISA task(s) untouched.', 'info');

          // Build the new CISA task objects
          var newTasks = CISA_TASKS.map(function (t) {
            return {
              id:          t.id,
              title:       t.title,
              category:    'Work',
              accentClass: 'accent-blue',
              icon:        ICON,
              frequency:   { type: 'once', startDate: t.date, endDate: t.date }
            };
          });

          var merged = kept.concat(newTasks);
          log('Writing ' + merged.length + ' total tasks back to Firestore …', 'info');

          return Firestore.setDoc(docPath, { tasks: merged }).then(function () {
            log('', '');
            log('✓ Done! ' + newTasks.length + ' CISA D4 tasks added successfully.', 'ok');
            log('', '');
            newTasks.forEach(function (t) {
              log('  ✓  ' + t.title + '  ·  one-time on ' + t.frequency.date, 'ok');
            });
            log('', '');
            log('You can now close this page and reload the habit app.', 'info');
          });
        });
      })
      ['catch'](function (err) {
        log('✗ Error: ' + (err && err.message ? err.message : String(err)), 'err');
        btnSeed.disabled = false;
      });
  };
})();
</script>
</body>
</html>
