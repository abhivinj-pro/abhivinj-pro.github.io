<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seed Tasks → Firebase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f111a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid #2d3452;
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 520px;
      width: 100%;
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: #94a3b8; font-size: 0.875rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
    input {
      width: 100%;
      background: #0f111a;
      border: 1px solid #2d3452;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log {
      margin-top: 24px;
      font-size: 0.82rem;
      line-height: 1.7;
      max-height: 320px;
      overflow-y: auto;
      background: #0a0c14;
      border-radius: 8px;
      padding: 14px;
      display: none;
    }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #60a5fa; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>
<div class="card">
  <h1>Seed Tasks → Firebase</h1>
  <p class="sub">Signs in as abhivinj@gmail.com and writes all tasks from tasks-config.js into Firestore.</p>

  <div id="login-section">
    <label for="email">Email</label>
    <input id="email" type="email" value="abhivinj@gmail.com" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Your Firebase password" />
    <button id="btn-seed" onclick="runSeed()">Sign in &amp; Seed Tasks</button>
  </div>

  <div id="log"></div>
</div>

<!-- Load app dependencies in order -->
<script src="assets/js/polyfills.js"></script>
<script src="assets/js/config/firebase-config.js"></script>
<script src="assets/js/auth/auth-client.js"></script>
<script src="assets/js/data/firestore-client.js"></script>
<script src="assets/js/config/tasks-config.js"></script>

<script>
(function () {
  var logEl = document.getElementById('log');
  var btnSeed = document.getElementById('btn-seed');

  function log(msg, cls) {
    logEl.style.display = 'block';
    var line = document.createElement('div');
    if (cls) { line.className = cls; }
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  window.runSeed = function () {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if (!email || !password) {
      log('⚠  Please fill in both email and password.', 'warn');
      return;
    }

    btnSeed.disabled = true;
    log('Signing in as ' + email + ' …', 'info');

    Auth.signIn(email, password)
      .then(function (user) {
        log('✓ Signed in. UID: ' + user.uid, 'ok');
        log('Reading existing tasks from Firestore …', 'info');

        var tasks = window.ALL_TASKS;
        if (!tasks || !tasks.length) {
          log('✗ window.ALL_TASKS is empty — did tasks-config.js load?', 'err');
          btnSeed.disabled = false;
          return;
        }

        log('Found ' + tasks.length + ' tasks in tasks-config.js.', 'info');

        // Sanitise: keep only the fields that storage.js / the app uses
        var cleaned = tasks.map(function (t) {
          var out = {
            id:          String(t.id || ''),
            title:       String(t.title || ''),
            category:    String(t.category || 'Self Care'),
            accentClass: String(t.accentClass || 'accent-blue'),
            icon:        String(t.icon || '')
          };
          // frequency — default to daily if absent
          if (t.frequency && typeof t.frequency === 'object') {
            out.frequency = t.frequency;
            // Normalize legacy `once` shape: { type:'once', date } →
            // { type:'once', startDate, endDate } so multi-day support reads
            // a single canonical shape.
            if (out.frequency.type === 'once') {
              var legacyDate = out.frequency.date;
              if (!out.frequency.startDate && legacyDate) {
                out.frequency.startDate = legacyDate;
              }
              if (!out.frequency.endDate) {
                out.frequency.endDate = out.frequency.startDate || legacyDate || '';
              }
              if (out.frequency.endDate && out.frequency.startDate &&
                  out.frequency.endDate < out.frequency.startDate) {
                out.frequency.endDate = out.frequency.startDate;
              }
              delete out.frequency.date;
            }
          } else {
            out.frequency = { type: 'daily' };
          }
          // optional times array
          if (Array.isArray(t.times) && t.times.length) {
            out.times = t.times;
          }
          return out;
        });

        var docPath = 'users/' + user.uid + '/config/tasks';
        log('Writing to Firestore → ' + docPath, 'info');

        return Firestore.setDoc(docPath, { tasks: cleaned })
          .then(function () {
            log('', '');
            log('✓ Done! All ' + cleaned.length + ' tasks written successfully.', 'ok');
            log('', '');
            cleaned.forEach(function (t) {
              var freq = t.frequency
                ? (t.frequency.type === 'weekly'
                    ? 'weekly [' + (t.frequency.days || []).join(',') + ']'
                    : t.frequency.type === 'interval'
                      ? 'every ' + t.frequency.every + ' weeks'
                      : 'daily')
                : 'daily';
              log('  ✓  ' + t.title + '  ·  ' + t.category + '  ·  ' + freq, 'ok');
            });
            log('', '');
            log('You can now close this page and reload the habit app.', 'info');
          });
      })
      ['catch'](function (err) {
        log('✗ Error: ' + (err && err.message ? err.message : String(err)), 'err');
        btnSeed.disabled = false;
      });
  };
})();
</script>
</body>
</html>
