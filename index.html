<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Habit Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Playfair+Display:ital,wght@1,500;1,700&display=swap">
  <link rel="stylesheet" href="styles.css?v=41">
  <link rel="stylesheet" href="auth.css?v=1">
</head>
<body data-auth-mode="loading">
  <div class="top-scroll-buffer" aria-hidden="true"></div>
  <div class="app-shell">
    <section class="screen morning-screen" id="morning-screen" aria-live="polite">
      <header class="routine-header">
        <nav class="page-nav" aria-label="Page navigation">
          <button type="button" class="page-nav-btn morning active nav-auth-required" id="morning-nav-morning" aria-current="page">Morning</button>
          <button type="button" class="page-nav-btn myday" id="morning-nav-myday">My Day</button>
          <button type="button" class="page-nav-btn work" id="morning-nav-work">Work</button>
          <button type="button" class="page-nav-btn clock" id="morning-nav-clock">Clock</button>
        </nav>
        <div class="routine-meta">
          <h1 id="morning-heading">Start with:</h1>
          <p id="morning-time-label">7:00 AM to 10:00 AM</p>
          <div class="routine-actions">
            <a class="nav-btn nav-auth-required routine-task-link" href="todo.html" id="morning-to-tasks">Task Manager</a>
            <span class="header-chip-slot" id="header-chip-slot-morning"></span>
          </div>
        </div>
      </header>
      <main class="routine-grid" id="routine-grid"></main>
    </section>

    <section class="screen myday-screen hidden" id="myday-screen" aria-live="polite">
      <header class="routine-header">
        <nav class="page-nav" aria-label="Page navigation">
          <button type="button" class="page-nav-btn morning nav-auth-required" id="myday-nav-morning">Morning</button>
          <button type="button" class="page-nav-btn myday active" id="myday-nav-myday" aria-current="page">My Day</button>
          <button type="button" class="page-nav-btn work" id="myday-nav-work">Work</button>
          <button type="button" class="page-nav-btn clock" id="myday-nav-clock">Clock</button>
        </nav>
        <div class="routine-meta">
          <h1 id="myday-date-heading">Today</h1>
          <p id="myday-task-count">0 tasks today</p>
          <div class="routine-actions">
            <a class="nav-btn nav-auth-required routine-task-link" href="todo.html" id="myday-to-tasks">Task Manager</a>
            <span class="header-chip-slot" id="header-chip-slot-myday"></span>
          </div>
        </div>
      </header>
      <div class="demo-banner hidden" id="demo-banner">
        You're viewing a sample.
        <button type="button" class="demo-banner-link" id="demo-banner-login">Log in</button>
        to manage your own tasks.
      </div>
      <main class="myday-grid" id="myday-grid"></main>
      <aside class="myday-quote hidden" id="myday-quote" aria-live="polite">
        <span class="myday-quote-mark" aria-hidden="true">&ldquo;</span>
        <p class="myday-quote-text" id="myday-quote-text"></p>
        <span class="myday-quote-author" id="myday-quote-author"></span>
      </aside>
      <details class="done-missed-section hidden" id="done-missed-section">
        <summary class="done-missed-toggle">
          <span class="done-missed-toggle-inner">
            <span>Caught Up</span>
            <span class="done-missed-count" id="done-missed-count">0</span>
          </span>
        </summary>
        <div class="done-missed-grid" id="done-missed-grid"></div>
      </details>
    </section>

    <section class="screen clock-screen hidden" id="clock-screen" aria-live="polite">
      <nav class="screen-nav clock-nav" aria-label="Screen navigation">
        <span class="header-chip-slot" id="header-chip-slot-clock"></span>
        <button type="button" class="nav-btn" id="clock-to-home">My Day</button>
        <a class="nav-btn nav-auth-required" href="todo.html" id="clock-to-tasks">Task Manager</a>
      </nav>
      <div class="clock-frame">
        <div class="clock-main">
          <p class="clock-day" id="clock-day">Sunday</p>
          <p class="clock-date" id="clock-date">May 10, 2026</p>
          <div class="clock-time" id="clock-time">
            <span class="clock-time-main" id="clock-time-main">00:00</span>
            <span class="clock-meridiem" id="clock-meridiem">AM</span>
            <span class="clock-seconds" id="clock-seconds">00</span>
          </div>
        </div>

        <aside class="calendar-panel" id="calendar-panel" aria-label="Monthly calendar">
          <div class="calendar-toolbar">
            <button type="button" class="calendar-nav" id="calendar-prev" aria-label="Previous month">&lsaquo;</button>
            <p class="calendar-month-label" id="calendar-month-label">May 2026</p>
            <button type="button" class="calendar-nav" id="calendar-next" aria-label="Next month">&rsaquo;</button>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </aside>
      </div>
    </section>
  </div>

  <noscript>
    <div class="noscript-note">This page needs JavaScript enabled to show the routine and live clock.</div>
  </noscript>

  <script src="polyfills.js?v=1"></script>
  <script src="firebase-config.js?v=1"></script>
  <script src="pro-allowlist.js?v=1"></script>
  <script src="tasks-config.js?v=1"></script>
  <script src="auth-client.js?v=1"></script>
  <script src="firestore-client.js?v=1"></script>
  <script src="storage.js?v=1"></script>
  <script src="auth-ui.js?v=1"></script>
  <script src="app.js?v=29"></script>
  <script>
    // Boot sequence: mount chip in every screen header, hook the demo banner
    // login button, then kick off Storage which drives the rest of the UI.
    (function () {
      function init() {
        if (!window.AuthUI || !window.Storage) { return; }
        window.AuthUI.mountChip(document.getElementById('header-chip-slot-morning'));
        window.AuthUI.mountChip(document.getElementById('header-chip-slot-myday'));
        window.AuthUI.mountChip(document.getElementById('header-chip-slot-clock'));

        var demoLoginBtn = document.getElementById('demo-banner-login');
        if (demoLoginBtn) {
          demoLoginBtn.onclick = function () {
            window.AuthUI.openLogin({ message: 'Log in to track your day across devices.' });
          };
        }

        function syncDemoBanner() {
          var banner = document.getElementById('demo-banner');
          if (!banner) { return; }
          if (window.Storage.mode === 'demo') {
            banner.classList.remove('hidden');
          } else {
            banner.classList.add('hidden');
          }
        }
        window.Storage.onChange(syncDemoBanner);
        syncDemoBanner();

        window.Storage.init();
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    }());
  </script>
</body>
</html>
