<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Habit Board</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="top-scroll-buffer" aria-hidden="true"></div>
  <div class="app-shell">
    <section class="screen morning-screen" id="morning-screen" aria-live="polite">
      <header class="routine-header">
        <div class="routine-badge">Morning reset</div>
        <div class="routine-meta">
          <h1>Start with:</h1>
          <p>7:00 AM to 9:30 AM</p>
        </div>
      </header>

      <main class="routine-grid" id="routine-grid"></main>
    </section>

    <section class="screen clock-screen hidden" id="clock-screen" aria-live="polite">
      <div class="clock-frame">
        <div class="clock-main">
          <p class="clock-day" id="clock-day">Sunday</p>
          <p class="clock-date" id="clock-date">May 10, 2026</p>
          <div class="clock-time" id="clock-time">
            <span class="clock-time-main" id="clock-time-main">00:00</span>
            <span class="clock-meridiem" id="clock-meridiem">AM</span>
            <span class="clock-seconds" id="clock-seconds">00</span>
          </div>
        </div>

        <aside class="calendar-panel" id="calendar-panel" aria-label="Monthly calendar">
          <div class="calendar-toolbar">
            <button type="button" class="calendar-nav" id="calendar-prev" aria-label="Previous month">&lsaquo;</button>
            <p class="calendar-month-label" id="calendar-month-label">May 2026</p>
            <button type="button" class="calendar-nav" id="calendar-next" aria-label="Next month">&rsaquo;</button>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <p class="calendar-hint">Swipe or scroll to change month</p>
        </aside>
      </div>
    </section>
  </div>

  <noscript>
    <div class="noscript-note">This page needs JavaScript enabled to show the routine and live clock.</div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
